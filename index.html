<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no" />
    <title>Candy Snake</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@400;600;800&display=swap" rel="stylesheet" />
    <style>
      /* Disable iOS rubber-band scroll, text selection, and the browser's
         default touch gestures so swipes don't fight the page. */

      #game { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
      canvas { touch-action: none; }
    </style>
  </head>

    <div id="game"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
